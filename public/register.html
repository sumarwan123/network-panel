<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - NETWORK PANEL</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box register-box">
      <div class="auth-header">
        <i class="fas fa-server"></i>
        <h1>NETWORK PANEL</h1>
        <p>Daftar Akun Baru</p>
      </div>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
          <label for="email">Email Gmail</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="phone">No WhatsApp</label>
          <input type="tel" id="phone" name="phone" placeholder="62..." required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Konfirmasi Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required>
        </div>
        <button type="submit" class="btn btn-primary">Daftar</button>
      </form>

      <div class="auth-footer">
        <p>Sudah memiliki akun? <a href="/login.html">Login di sini</a></p>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    async function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, phone, password, confirmPassword })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          showToast('Registrasi berhasil!', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1500);
        } else {
          showToast(data.message, 'error');
        }
      } catch (error) {
        console.error('Register error:', error);
        showToast('Terjadi kesalahan', 'error');
      }
    }
  </script>
</body>
</html>
